name: Sync Spec to Mirror

on:
  push:
    branches: [main]
    paths:
      - 'spec/**'
  workflow_dispatch:  # Manual trigger for recovery

concurrency:
  group: sync-spec-to-mirror
  cancel-in-progress: true  # Latest spec state wins

jobs:
  sync-spec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CLI repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Checkout Spec repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          repository: portolan-sdi/portolan-spec
          token: ${{ secrets.SPEC_REPO_PAT }}
          path: spec-repo
          persist-credentials: false

      - name: Sync spec to mirror
        run: |
          cd spec-repo

          # Remove all content except .git, .github, and CODE_OF_CONDUCT.md
          # These are preserved in the mirror repo
          find . -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            ! -name 'CODE_OF_CONDUCT.md' \
            ! -name 'LICENSE' \
            -exec rm -rf {} +

          cd ..

          # Copy entire spec directory contents to mirror root
          cp -r spec/* spec-repo/

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          token: ${{ secrets.SPEC_REPO_PAT }}
          path: spec-repo
          branch: sync/cli-spec
          delete-branch: true
          title: "sync: Update spec from portolan-cli"
          body: |
            Automated spec sync from portolan-cli.

            **Source commit:** portolan-sdi/portolan-cli@${{ github.sha }}
            **Triggered by:** ${{ github.event.head_commit.message }}

            The portolan-cli repository is the source of truth for the Portolan
            specification. This PR syncs changes from `portolan-cli/spec/` to
            the portolan-spec mirror.

            See [ADR-0048](https://github.com/portolan-sdi/portolan-cli/blob/main/context/shared/adr/0048-cli-as-spec-source.md) for rationale.

            ---
            _Auto-generated by [sync-spec](https://github.com/portolan-sdi/portolan-cli/blob/main/.github/workflows/sync-spec.yml)_
          commit-message: "sync: Update spec from portolan-cli@${{ github.sha }}"
          labels: |
            automated
            spec-sync
