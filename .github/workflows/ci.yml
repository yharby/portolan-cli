# Tier 2 CI - Runs on every PR and push to main
# See context/shared/documentation/ci.md for the full CI strategy
#
# Philosophy: Starting from zero, all quality gates are STRICT.
# Nothing passes with warnings - fix issues or they block the PR.
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      iceberg: ${{ steps.filter.outputs.iceberg }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            iceberg:
              - 'portolan_cli/backends/iceberg/**'
              - 'tests/iceberg/**'
              - 'pyproject.toml'

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.14"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check code formatting
        run: uv run ruff format --check .

      - name: Run linter
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy portolan_cli

      - name: Spell check
        run: uv run codespell --skip "*.parquet,*.tif,.git,*.lock" portolan_cli tests docs

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.14"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run bandit security scan
        run: uv run bandit -r portolan_cli -c pyproject.toml

      - name: Audit dependencies (runtime + extras only)
        # Audit only what we ship: core runtime deps plus the publishable extras
        # (iceberg, pmtiles, thumbnails). Dev-group deps (moto, pytest, pip-audit
        # itself...) and doc-build deps (mkdocs, pymdown-extensions...) are excluded
        # because they never reach users via the wheel.
        #
        # Ignored advisories (kept minimal, each with rationale):
        # - CVE-2026-4539 (pygments): ReDoS in AdlLexer, CVSS 3.3, local input only.
        #   No upstream fix available. Track:
        #   https://github.com/portolan-sdi/portolan-cli/issues/285
        # - PYSEC-2024-277 (joblib / CVE-2024-34997): vendor-disputed. joblib upstream
        #   considers NumpyArrayWrapper.read_array safe because it only deserializes
        #   content the same process just cached (see joblib/joblib#1582, #977). No
        #   fixed version has been or will be released. joblib is transitive via
        #   contextily[thumbnails]; we do not import it directly.
        run: |
          uv export --no-dev --no-emit-project --no-hashes \
            --extra iceberg --extra pmtiles --extra thumbnails \
            -o /tmp/runtime-deps.txt
          uv run pip-audit \
            --requirement /tmp/runtime-deps.txt \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln PYSEC-2024-277

  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
        exclude:
          # Reduce matrix size - test older Python only on Linux
          - os: macos-latest
            python-version: '3.10'
          - os: windows-latest
            python-version: '3.10'
    env:
      # Prevent obstore from attempting EC2 metadata service calls
      # GitHub Actions runners aren't EC2 instances, so IMDS requests fail
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.14"

      - name: Set up Python ${{ matrix.python-version }}
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install ${{ matrix.python-version }}

      - name: Install tippecanoe (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y tippecanoe

      - name: Install tippecanoe (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install tippecanoe

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests (unit + integration, no network, no iceberg)
        run: uv run pytest tests/ --ignore=tests/iceberg/ -v --tb=short -m "not network and not slow and not benchmark" -n auto --dist loadscope --cov=portolan_cli --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: portolan-sdi/portolan-cli

  iceberg-test:
    name: Iceberg Unit & Integration Tests (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.iceberg == 'true' || github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']
    env:
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.14"

      - name: Set up Python ${{ matrix.python-version }}
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra iceberg --extra dev

      - name: Run unit and integration tests
        run: uv run pytest tests/iceberg/ -v --tb=short -m "not e2e and not e2e_slow and not network and not slow" --cov=portolan_cli/backends/iceberg --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: portolan-sdi/portolan-cli
          flags: iceberg

  iceberg-e2e:
    name: Iceberg E2E Tests (Python ${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.iceberg == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.14"

      - name: Set up Python ${{ matrix.python-version }}
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra iceberg --extra dev --extra e2e

      - name: Start Docker services
        run: docker compose -f tests/iceberg/e2e/docker-compose.yml up -d --wait

      - name: Wait for REST catalog
        run: timeout 60 bash -c 'until curl -sf http://localhost:8181/v1/config; do sleep 2; done'

      - name: Wait for MinIO
        run: timeout 60 bash -c 'until curl -sf http://localhost:9000/minio/health/live; do sleep 2; done'

      - name: Run E2E tests (fast tier, excludes e2e_slow)
        run: uv run pytest tests/iceberg/e2e/ -v --tb=long -m "e2e and not e2e_slow" --timeout=120

      - name: Docker logs (on failure)
        if: failure()
        run: docker compose -f tests/iceberg/e2e/docker-compose.yml logs

      - name: Teardown
        if: always()
        run: docker compose -f tests/iceberg/e2e/docker-compose.yml down -v

  dead-code:
    name: Dead Code, Complexity & Duplication
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.14"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check for dead code
        run: uv run vulture portolan_cli tests --min-confidence 80

      - name: Check code complexity
        run: uv run xenon --max-absolute=C --max-modules=B --max-average=A portolan_cli tests

      - name: Check for duplicate code
        run: uv run pylint --disable=all --enable=duplicate-code --fail-under=9.5 portolan_cli/

  docs:
    name: Documentation Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.14"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build documentation
        run: uv run mkdocs build --strict

      - name: Test documentation examples
        run: uv run pytest tests/docs/ -v --tb=short

  build:
    name: Build Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.14"

      - name: Set up Python
        run: uv python install 3.11

      - name: Build package
        run: uv build

      - name: Check package contents
        run: |
          uv run python -c "import tarfile; t = tarfile.open(list(__import__('pathlib').Path('dist').glob('*.tar.gz'))[0]); print('\n'.join(t.getnames()))"
